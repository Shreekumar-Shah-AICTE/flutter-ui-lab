name: Build All APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: 01_pulse
            name: pulse
          - app: 02_gateway
            name: gateway
          - app: 03_calc_noir
            name: calc_noir
          - app: 04_atlas
            name: atlas
          - app: 05_enroll
            name: enroll
          - app: 06_catalog
            name: catalog
          - app: 07_momentum
            name: momentum
          - app: 08_vault
            name: vault
          - app: 09_storefront
            name: storefront
          - app: 10_dispatch
            name: dispatch
          - app: 11_archive
            name: archive

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Check if app exists
        id: check
        run: |
          if [ -d "apps/${{ matrix.app }}" ] && [ -f "apps/${{ matrix.app }}/pubspec.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Flutter project scaffold
        if: steps.check.outputs.exists == 'true'
        run: |
          cd apps/${{ matrix.app }}
          # Back up our custom files
          cp pubspec.yaml pubspec.yaml.bak
          cp -r lib lib_bak
          # Generate full Flutter scaffold (android/, ios/, web/, test/)
          flutter create --project-name ${{ matrix.name }} --org com.flutteruilab .
          # Restore our custom files over the generated ones
          cp pubspec.yaml.bak pubspec.yaml
          rm -rf lib
          cp -r lib_bak lib
          rm -rf lib_bak pubspec.yaml.bak

      - name: Install design system dependencies
        if: steps.check.outputs.exists == 'true'
        run: cd packages/design_system && flutter pub get

      - name: Install app dependencies
        if: steps.check.outputs.exists == 'true'
        run: cd apps/${{ matrix.app }} && flutter pub get

      - name: Build APK
        if: steps.check.outputs.exists == 'true'
        run: cd apps/${{ matrix.app }} && flutter build apk --release

      - name: Upload APK
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-apk
          path: apps/${{ matrix.app }}/build/app/outputs/flutter-apk/app-release.apk

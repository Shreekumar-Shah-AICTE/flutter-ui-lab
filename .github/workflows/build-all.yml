name: Build All APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - 01_pulse
          - 02_gateway
          - 03_calc_noir
          - 04_atlas
          - 05_enroll
          - 06_catalog
          - 07_momentum
          - 08_vault
          - 09_storefront
          - 10_dispatch
          - 11_archive

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Check if app exists
        id: check
        run: |
          if [ -d "apps/${{ matrix.app }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install design system dependencies
        if: steps.check.outputs.exists == 'true'
        run: cd packages/design_system && flutter pub get

      - name: Install app dependencies
        if: steps.check.outputs.exists == 'true'
        run: cd apps/${{ matrix.app }} && flutter pub get

      - name: Build APK
        if: steps.check.outputs.exists == 'true'
        run: cd apps/${{ matrix.app }} && flutter build apk --release

      - name: Upload APK
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-apk
          path: apps/${{ matrix.app }}/build/app/outputs/flutter-apk/app-release.apk

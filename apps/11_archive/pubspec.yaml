name: archive
description: A color-coded note-taking app with full SQLite CRUD operations.
publish_to: none
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  design_system:
    path: ../../packages/design_system
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.0
  sqflite: ^2.3.0
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
